
    <!DOCTYPE html>
    <html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Resurge - {nombre_miembro}</title>
    <style>
    :root {
        --blue-dark: #001a33;
        --blue: #1a73e8;
        --white: #ffffff;
        --black: #000000;
        --red: #e53935;
    }

    body {
        margin: 0;
        font-family: 'Segoe UI', Arial, sans-serif;
        background: var(--black);
        color: var(--white);
        min-height: 100vh;
        overflow-x: hidden;
    }

    /* Logo centrado como fondo */
    .logo-container {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 0;
        opacity: 0.12;
        pointer-events: none;
    }
    .logo-container img {
        max-width: 70vw;
        height: auto;
    }

    .logo-background {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 0; /* detrás de todo */
        opacity: 0.15;
        pointer-events: none;
    }

    .logo-background img {
        max-width: 400px;
        width: 80vw;
        height: auto;
    }


    /* Main lateral fijo con scroll vertical */
    main {
        display: flex;
        flex-direction: column;
        gap: 1rem;
        position: fixed;
        top: 0;
        left: 0;
        height: 100vh;
        width: 300px;
        padding: 1rem;
        overflow-y: auto;
        background: rgba(0, 15, 40, 0.45);
        border-right: 1px solid var(--blue);
        backdrop-filter: blur(6px);
        z-index: 2;
    }

    /* Scroll personalizado */
    main::-webkit-scrollbar {
        width: 8px;
    }
    main::-webkit-scrollbar-thumb {
        background: rgba(26,115,232,0.5);
        border-radius: 4px;
    }
    main::-webkit-scrollbar-thumb:hover {
        background: rgba(26,115,232,0.8);
    }

    /* Cards */
    .card {
        background: rgba(0, 30, 60, 0.6);
        border: 1px solid var(--blue);
        border-radius: 14px;
        box-shadow: 0 0 12px rgba(26,115,232,0.5);
        padding: 1rem;
        text-decoration: none;
        color: var(--white);
        display: flex;
        flex-direction: column;
        transition: all 0.3s ease;
    }
    .card:hover {
        transform: scale(1.05);
        border-color: var(--white);
        box-shadow: 0 0 18px var(--blue);
    }
    .card h3 {
        margin: 0 0 0.5rem 0;
        color: var(--blue);
    }
    .card p {
        font-size: 0.9rem;
        opacity: 0.9;
        line-height: 1.4;
    }

    /* Footer */
    footer {
        position: fixed;
        bottom: 0;
        left: 50%;
        transform: translateX(-50%);
        padding: 1rem;
        font-size: 0.9rem;
        z-index: 2;
        color: var(--white);
    }
    footer span {
        color: var(--red);
    }

    /* Móvil */
    @media (max-width: 768px) {
        main {
            width: 85%;
            max-width: 320px;
        }
        .logo-container img {
            max-width: 90vw;
            opacity: 0.08;
        }
    }
    </style>
    </head>
    <body>
        <div class="logo-background">
            <img src="logotipo.png" alt="Resurge">
        </div>

        <main>
            <a class="card" href="queesresurge.html">
                <h3>¿Qué es Resurge?</h3>
                <p>Descubre nuestra visión y propósito.</p>
            </a>
            <a class="card" href="miembros.html">
                <h3>Miembros</h3>
                <p>Conoce a nuestra comunidad y sus logros.</p>
            </a>
            <a class="card" href="tiposventas.html">
                <h3>Tipos de Ventas</h3>
                <p>Opciones de crecimiento adaptadas a tu estilo.</p>
            </a>
            <a class="card" href="galeria.html">
                <h3>Galería</h3>
                <p>Revive momentos únicos de Resurge.</p>
            </a>
        </main>

        <footer>
            <p>Hecho con <span>❤</span> en Resurge</p>
        </footer>
    </body>
    </html>
