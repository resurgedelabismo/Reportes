
    <!DOCTYPE html>
    <html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Miembros - Alan Martinez</title>
<style>
    :root {
        --blue: #1a73e8;
        --white: #ffffff;
        --black: #000000;
        --red: #e53935;
    }

    body {
        margin: 0;
        font-family: 'Segoe UI', Arial, sans-serif;
        background: var(--black);
        color: var(--white);
        min-height: 100vh;
        overflow-x: hidden;
    }

    /* 🔹 Logo centrado como fondo */
    .logo-background {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 0;
        opacity: 0.15;
        pointer-events: none;
    }
    .logo-background img {
        max-width: 60vw;
        height: auto;
    }

    /* 🔹 Main lateral */
    main {
        display: flex;
        flex-direction: column;
        gap: 1rem;
        position: fixed;
        top: 0;
        left: 0;
        height: 100vh;
        width: 25%;
        min-width: 200px;
        max-width: 300px;
        padding: 2%;
        overflow-y: auto;
        background: rgba(0, 15, 40, 0.35);
        border-right: 1px solid rgba(255,255,255,0.15);
        backdrop-filter: blur(6px);
        z-index: 2;
    }

    /* Scroll estilizado */
    main::-webkit-scrollbar {
        width: 6px;
    }
    main::-webkit-scrollbar-thumb {
        background: rgba(26,115,232,0.5);
        border-radius: 3px;
    }

    /* 🔹 Cards */
    .card {
        background: rgba(0, 30, 60, 0.45); /* más transparente */
        border: 1px solid var(--blue);
        border-radius: 12px;
        padding: 1rem;
        text-decoration: none;
        color: var(--white);
        display: flex;
        flex-direction: column;
        transition: all 0.3s ease;
    }
    .card:hover {
        transform: scale(1.05);
        border-color: var(--white);
        box-shadow: 0 0 15px var(--blue);
    }
    .card h3 {
        margin: 0 0 0.5rem 0;
        color: var(--blue);
        font-size: 1.1rem;
    }
    .card p {
        font-size: 0.9rem;
        opacity: 0.8;
        line-height: 1.4;
    }

    /* 🔹 Footer premium */
    footer {
        position: fixed;
        bottom: 0;
        left: 0;
        width: 100%;
        text-align: center;
        padding: 1rem 0;
        font-size: 0.9rem;
        color: var(--white);
        background: rgba(0,0,0,0.4);
        backdrop-filter: blur(4px);
        z-index: 2;
    }
    footer::before {
        content: "";
        display: block;
        width: 80%;
        margin: 0 auto 0.5rem auto;
        border-top: 1px solid rgba(255,255,255,0.2);
    }
    footer span {
        color: var(--red);
        font-weight: bold;
    }

    /* 🔹 Responsive */
    @media (max-width: 768px) {
        main {
            width: 70%;
            max-width: 80%;
            min-width: 60%;
        }
        .logo-background img {
            max-width: 80vw;
            opacity: 0.12;
        }
    }
    </style>
    </head>
    <body>

        <div class="logo-background">
            <img src="logotipo.png" alt="Logotipo">
        </div>
            <header>
                <h1>Miembros</h1>
            </header>

        <main>
            <h2>Miembros Resurge</h2><p>Explora nuestra red de miembros y descubre historias inspiradoras.</p>
            <a href="index.html" class="boton">Inicio</a>
        </main>

        <footer>
            
        </footer>
    </body>
    </html>
